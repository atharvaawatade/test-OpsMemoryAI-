name: OpsMemory AI Deployment Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Step 1: Run unit tests ─────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Step 2: OpsMemory AI safety analysis ──────────────────────────────────
  opsmemory-gate:
    name: OpsMemory AI Safety Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build OpsMemory payload
        id: build_payload
        run: |
          # Collect commit message and diff summary
          COMMIT_MSG=$(git log -1 --pretty=%B)

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF=$(git diff origin/${{ github.base_ref }}...HEAD 2>/dev/null | head -200 || echo "diff unavailable")
          else
            DIFF=$(git diff HEAD~1 HEAD 2>/dev/null | head -200 || echo "Initial commit")
          fi

          # Write payload safely via Python to avoid shell escaping issues
          python3 - <<'PYEOF'
          import json, os

          commit_msg = os.popen("git log -1 --pretty=%B").read().strip()
          service    = "checkout-service"

          payload = {
              "service": service,
              "changes": commit_msg
          }

          with open("/tmp/opsmemory_payload.json", "w") as f:
              json.dump(payload, f)

          print("Payload written:")
          print(json.dumps(payload, indent=2))
          PYEOF

      - name: Call OpsMemory AI
        id: opsmemory
        run: |
          echo "🧠 Sending to OpsMemory AI..."
          cat /tmp/opsmemory_payload.json

          curl -s -X POST \
            "https://ops-memory-ai.vercel.app/api/demo" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/opsmemory_payload.json \
            --max-time 120 \
            -o /tmp/opsmemory_response.json

          echo ""
          echo "Raw response:"
          cat /tmp/opsmemory_response.json

          # Parse verdict and reasoning safely
          python3 - <<'PYEOF'
          import json, os

          try:
              with open("/tmp/opsmemory_response.json") as f:
                  data = json.load(f)
              verdict   = data.get("verdict", "UNKNOWN")
              reasoning = data.get("reasoning", "No reasoning returned.")
          except Exception as e:
              verdict   = "UNKNOWN"
              reasoning = f"Could not parse OpsMemory response: {e}"

          # Write to GITHUB_OUTPUT
          gho = os.environ.get("GITHUB_OUTPUT", "/dev/stdout")
          with open(gho, "a") as out:
              out.write(f"verdict={verdict}\n")
              out.write("reasoning<<EOF\n")
              out.write(reasoning + "\n")
              out.write("EOF\n")

          print(f"\nVerdict  : {verdict}")
          print(f"Reasoning: {reasoning[:300]}")
          PYEOF

      - name: Gate decision
        run: |
          VERDICT="${{ steps.opsmemory.outputs.verdict }}"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  OpsMemory AI Verdict: $VERDICT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "${{ steps.opsmemory.outputs.reasoning }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$VERDICT" = "DENY" ]; then
            echo ""
            echo "⛔ DEPLOYMENT BLOCKED BY OpsMemory AI"
            echo "Review the flagged signals and get sign-off from the platform team."
            exit 1

          elif [ "$VERDICT" = "NEEDS_REVIEW" ] || [ "$VERDICT" = "NEEDS REVIEW" ]; then
            echo ""
            echo "⚠️  MANUAL REVIEW REQUIRED"
            exit 0

          else
            echo ""
            echo "✅ DEPLOYMENT APPROVED by OpsMemory AI"
            exit 0
          fi
