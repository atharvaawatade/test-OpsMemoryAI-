name: OpsMemory AI Deployment Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  opsmemory-gate:
    name: OpsMemory AI Safety Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run OpsMemory signal analysis
        run: python3 scripts/check_signals.py
